<!DOCTYPE html>
<html lang="zh-cmn-Hans" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS</title>
    <link rel="stylesheet" type="text/css" href="/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script type="text/javascript" src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" type="text/css" href="/node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <script>
      const url = new URL(window.location.href);
      if(url.searchParams.get('password')=='666'){location.href='index.html'}
    </script>
    <style>
      .main{
        width: 45%;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%);
      }
      .title{
        display: block;
        text-align: center;
      }
    </style>
</head>
  <body>
    <div class="main container-fluid border rounded">
      <form class="form-floating">
        <div class="form-floating mb-3">
          <div class="input-group flex-nowrap mt-3">
            <span class="input-group-text title w-100">CMS</span>
          </div>
          <div class="input-group flex-nowrap mt-3">
            <span class="input-group-text bi bi-person"></span>
            <input type="text" class="form-control" placeholder="账号" name="username" required>
          </div>
          <div class="input-group flex-nowrap mt-3">
            <span class="input-group-text bi bi-key"></span>
            <input type="password" class="form-control" placeholder="密码" name="password" required>
          </div>
          <div class="input-group flex-nowrap mt-3">
            <span class="input-group-text title w-100 bi bi-info-circle border-success"> 请输入账号和密码。</span>
          </div>
          <button class="btn btn-outline-success mt-3 w-100">
            <i class="bi bi-box-arrow-in-right"></i> 登录
          </button>
      </form>
    </div>
  </body>
</html>
